<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ገቢ እና ወጪ መዝገብ</title>
<meta name="theme-color" content="#1a472a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ገቢ ወጪ"/>
<link id="manifestLink" rel="manifest"/>
<link id="appleIcon" rel="apple-touch-icon"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
  :root{--green-deep:#1a472a;--green-mid:#2d6a4f;--green-light:#52b788;--green-pale:#d8f3dc;--gold:#e9c46a;--red:#e63946;--red-pale:#fde8e9;--bg:#f4f7f5;--surface:#ffffff;--text:#1a2e1f;--muted:#6b8c74;--border:#d0e8d8;--radius:14px;--shadow:0 2px 16px rgba(26,71,42,0.10);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans Ethiopic','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--green-deep);color:#fff;padding:18px 20px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  header h1{font-size:1.2rem;font-weight:700;}
  header .subtitle{font-size:0.72rem;opacity:0.7;margin-top:2px;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{background:rgba(255,255,255,0.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
  .month-nav button:hover{background:rgba(255,255,255,0.3);}
  .month-nav span{font-size:0.85rem;font-weight:600;min-width:80px;text-align:center;}
  .summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 16px 0;}
  .card{background:var(--surface);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);text-align:center;}
  .card .label{font-size:0.7rem;color:var(--muted);margin-bottom:4px;}
  .card .amount{font-size:1.05rem;font-weight:700;font-family:'Inter',sans-serif;}
  .card.income .amount{color:var(--green-mid);}
  .card.expense .amount{color:var(--red);}
  .card.balance .amount{color:var(--green-deep);}
  .card.balance{background:var(--green-pale);}
  .progress-wrap{padding:14px 16px 0;}
  .progress-label{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:6px;}
  .progress-bar{height:8px;background:#e0ede4;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;transition:width 0.5s ease;background:linear-gradient(90deg,var(--green-light),var(--green-mid));}
  .progress-fill.over{background:linear-gradient(90deg,#f4a261,var(--red));}
  .tabs{display:flex;padding:14px 16px 0;gap:8px;}
  .tab-btn{flex:1;padding:9px;border:none;border-radius:10px;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);box-shadow:var(--shadow);transition:all 0.2s;}
  .tab-btn.active{background:var(--green-deep);color:#fff;}
  .section{padding:14px 16px;flex:1;}
  .section-title{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.9rem;}
  .empty-state .icon{font-size:2.5rem;margin-bottom:10px;}
  .tx-list{display:flex;flex-direction:column;gap:8px;}
  .tx-item{background:var(--surface);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(26,71,42,0.07);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
  .tx-item:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
  .tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .tx-icon.income{background:var(--green-pale);}
  .tx-icon.expense{background:var(--red-pale);}
  .tx-info{flex:1;min-width:0;}
  .tx-desc{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-cat{font-size:0.72rem;color:var(--muted);margin-top:1px;}
  .tx-right{text-align:right;flex-shrink:0;}
  .tx-amount{font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:700;}
  .tx-amount.income{color:var(--green-mid);}
  .tx-amount.expense{color:var(--red);}
  .tx-date{font-size:0.68rem;color:var(--muted);margin-top:2px;}
  .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--green-deep);color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 20px rgba(26,71,42,0.35);display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;z-index:100;}
  .fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(26,71,42,0.45);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:22px 22px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
  .close-btn{background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .type-btn{padding:10px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);transition:all 0.2s;}
  .type-btn.active.income-btn{border-color:var(--green-mid);background:var(--green-pale);color:var(--green-deep);}
  .type-btn.active.expense-btn{border-color:var(--red);background:var(--red-pale);color:var(--red);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field input,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.9rem;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s;}
  .field input:focus,.field select:focus{border-color:var(--green-mid);}
  .amount-input-wrap{position:relative;}
  .amount-input-wrap input{padding-right:44px;font-weight:700;font-size:1rem;}
  .currency-label{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:0.78rem;color:var(--muted);font-weight:600;}
  .submit-btn{width:100%;padding:13px;margin-top:8px;background:var(--green-deep);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background 0.2s,transform 0.15s;}
  .submit-btn:hover{background:var(--green-mid);transform:translateY(-1px);}
  .delete-modal{background:var(--surface);border-radius:22px 22px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;animation:slideUp 0.3s ease;text-align:center;}
  .delete-modal .icon{font-size:2.5rem;margin-bottom:12px;}
  .delete-modal p{font-size:0.9rem;color:var(--muted);margin:8px 0 20px;}
  .del-actions{display:flex;gap:10px;}
  .del-btn{flex:1;padding:12px;border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;}
  .del-btn.cancel{background:var(--bg);color:var(--muted);}
  .del-btn.confirm{background:var(--red);color:#fff;}
  .chart-wrap{padding:0 16px 14px;}
  .bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;}
  .bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .bars{display:flex;gap:2px;align-items:flex-end;width:100%;justify-content:center;}
  .bar{width:10px;border-radius:4px 4px 0 0;min-height:2px;transition:height 0.4s ease;}
  .bar.in{background:var(--green-light);}
  .bar.ex{background:#f4a261;}
  .bar-label{font-size:0.58rem;color:var(--muted);}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{white-space:nowrap;padding:5px 12px;border-radius:99px;font-family:inherit;font-size:0.75rem;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s;}
  .chip.active{background:var(--green-deep);color:#fff;border-color:var(--green-deep);}
  .chips-wrap{padding:10px 16px 0;}
  /* Install banner */
  #installBanner{display:none;background:var(--gold);color:var(--green-deep);padding:10px 16px;align-items:center;gap:10px;font-size:0.82rem;font-weight:600;}
  #installBanner button{margin-left:auto;padding:6px 14px;background:var(--green-deep);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;}
  #installBanner .dismiss{background:transparent;color:var(--green-deep);padding:4px 8px;opacity:0.6;}
</style>
</head>
<body>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <span>📲 App ን ለ Install ጠቅ አድርግ</span>
  <button id="dismissBtn" class="dismiss">✕</button>
  <button id="installBtn">Install</button>
</div>

<!-- HEADER -->
<header>
  <div>
    <h1>💰 ገቢ እና ወጪ</h1>
    <div class="subtitle">የወርሃዊ የፋይናንስ መዝገብ</div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</header>

<!-- SUMMARY CARDS -->
<div class="summary">
  <div class="card income"><div class="label">ጠቅላላ ገቢ</div><div class="amount" id="totalIncome">0</div></div>
  <div class="card expense"><div class="label">ጠቅላላ ወጪ</div><div class="amount" id="totalExpense">0</div></div>
  <div class="card balance"><div class="label">ቀሪ ሂሳብ</div><div class="amount" id="balance">0</div></div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-wrap">
  <div class="progress-label"><span>የወጪ ደረጃ</span><span id="progressPct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- MINI CHART -->
<div class="chart-wrap" id="chartSection" style="margin-top:14px;"></div>

<!-- FILTER CHIPS -->
<div class="chips-wrap"><div class="chips" id="chipContainer"></div></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="setTab('all')" id="tab-all">ሁሉም</button>
  <button class="tab-btn" onclick="setTab('income')" id="tab-income">ገቢ</button>
  <button class="tab-btn" onclick="setTab('expense')" id="tab-expense">ወጪ</button>
</div>

<!-- TRANSACTIONS -->
<div class="section">
  <div class="section-title" id="listTitle">ሁሉም ግብይቶች</div>
  <div class="tx-list" id="txList"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">አዲስ ግብይት</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn income-btn active" id="incomeBtn" onclick="setType('income')">📥 ገቢ</button>
      <button class="type-btn expense-btn" id="expenseBtn" onclick="setType('expense')">📤 ወጪ</button>
    </div>
    <div class="field"><label>መግለጫ</label><input type="text" id="desc" placeholder="ምን ዓይነት ገቢ / ወጪ?" maxlength="60"/></div>
    <div class="field"><label>መጠን (ብር)</label><div class="amount-input-wrap"><input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/><span class="currency-label">ብር</span></div></div>
    <div class="field"><label>ምድብ</label><select id="cat"></select></div>
    <div class="field"><label>ቀን</label><input type="date" id="txDate"/></div>
    <button class="submit-btn" onclick="saveTx()" id="submitBtn">💾 አስቀምጥ</button>
    <button class="submit-btn" id="delBtn" onclick="openDeleteFromEdit()" style="margin-top:8px;background:#fde8e9;color:var(--red);display:none;">🗑️ ሰርዝ</button>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="overlay" id="delOverlay" onclick="handleDelOverlay(event)">
  <div class="delete-modal">
    <div class="icon">🗑️</div>
    <div class="modal-title" style="justify-content:center;">ምዝገባ ሰርዝ?</div>
    <p>ይህን ግብይት ሙሉ በሙሉ ለማጥፋት ይፈልጋሉ?</p>
    <div class="del-actions">
      <button class="del-btn cancel" onclick="closeDelModal()">ሰርዝ</button>
      <button class="del-btn confirm" onclick="confirmDelete()">አዎ፣ ሰርዝ</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  PWA — Inline Manifest + Service Worker
// ══════════════════════════════════════════
(function(){
  // 1) SVG icon as data URI
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="100" fill="#1a472a"/>
    <rect x="80" y="160" width="352" height="240" rx="24" fill="#e9c46a"/>
    <rect x="80" y="210" width="352" height="50" fill="#c49a2a"/>
    <circle cx="256" cy="340" r="40" fill="#1a472a"/>
    <circle cx="256" cy="340" r="24" fill="#e9c46a"/>
    <rect x="180" y="175" width="152" height="30" rx="8" fill="#1a472a" opacity="0.4"/>
  </svg>`;
  const iconUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(iconSvg)));

  // 2) Inject apple-touch-icon
  document.getElementById('appleIcon').href = iconUrl;

  // 3) Build manifest blob
  const manifest = {
    name: 'ገቢ እና ወጪ መዝገብ',
    short_name: 'ገቢ ወጪ',
    description: 'የወርሃዊ የፋይናንስ መቆጣጠሪያ',
    start_url: './',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#1a472a',
    theme_color: '#1a472a',
    lang: 'am',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  document.getElementById('manifestLink').href = URL.createObjectURL(manifestBlob);

  // 4) Register inline Service Worker
  const swCode = `
const CACHE = 'gebiwoch-v1';
const SHELL = [self.location.href];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(SHELL)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if(cached) return cached;
      return fetch(e.request).then(res => {
        if(res && res.status === 200 && res.type === 'basic'){
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => caches.match(SHELL[0]));
    })
  );
});
  `;
  if('serviceWorker' in navigator){
    const swBlob = new Blob([swCode], {type:'text/javascript'});
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
  }
})();

// ══════════════════════════════════════════
//  PWA Install Prompt
// ══════════════════════════════════════════
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  banner.style.display = 'flex';
});
document.getElementById('installBtn').onclick = async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
};
document.getElementById('dismissBtn').onclick = () => {
  document.getElementById('installBanner').style.display = 'none';
};
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});

// ══════════════════════════════════════════
//  APP DATA
// ══════════════════════════════════════════
const CATS = {
  income:  ['ደሞዝ','ቢዝነስ ገቢ','ሽያጭ','ቅዳሜ ስራ','ኪራይ','ሌላ ገቢ'],
  expense: ['ምግብ','ቤት ኪራይ','ትራንስፖርት','ልብስ','ጤና','ትምህርት','መብራት/ውሃ','ስልክ','ቤተሰብ','ሌላ ወጪ']
};
const MONTHS_AM = ['ጥር','የካቲት','መጋቢት','ሚያዚያ','ግንቦት','ሰኔ','ሐምሌ','ነሐሴ','መስከረም','ጥቅምት','ህዳር','ታህሳስ'];

let txns = JSON.parse(localStorage.getItem('txns') || '[]');
let currentType = 'income';
let currentTab  = 'all';
let filterCat   = 'all';
let editId      = null;
let deleteId    = null;
let viewDate    = new Date();

function fmt(n){ return Number(n).toLocaleString('en-ET',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function save(){ localStorage.setItem('txns', JSON.stringify(txns)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function currentMonthKey(){ return `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}`; }

function changeMonth(d){ viewDate.setMonth(viewDate.getMonth()+d); renderAll(); }

function renderAll(){
  const key = currentMonthKey();
  document.getElementById('monthLabel').textContent = MONTHS_AM[viewDate.getMonth()]+' '+viewDate.getFullYear();
  const monthTx = txns.filter(t=>t.date.startsWith(key));
  const totalIncome  = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExpense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal = totalIncome - totalExpense;
  document.getElementById('totalIncome').textContent  = fmt(totalIncome);
  document.getElementById('totalExpense').textContent = fmt(totalExpense);
  document.getElementById('balance').textContent      = fmt(bal);
  const pct = totalIncome>0 ? Math.min(Math.round(totalExpense/totalIncome*100),999) : 0;
  document.getElementById('progressPct').textContent = pct+'%';
  const fill = document.getElementById('progressFill');
  fill.style.width = Math.min(pct,100)+'%';
  fill.classList.toggle('over', pct>80);
  renderChart();
  renderChips(monthTx);
  renderList(monthTx);
}

function renderChart(){
  const wrap = document.getElementById('chartSection');
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(viewDate.getFullYear(),viewDate.getMonth()-i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const m=txns.filter(t=>t.date.startsWith(k));
    months.push({label:MONTHS_AM[d.getMonth()].slice(0,2),inc:m.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),exp:m.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)});
  }
  const maxVal=Math.max(...months.map(m=>Math.max(m.inc,m.exp)),1);
  wrap.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;"><span style="font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">ባለፉት 6 ወራት</span><span style="font-size:0.68rem;color:var(--muted);display:flex;gap:8px;align-items:center;"><span style="display:inline-block;width:8px;height:8px;background:var(--green-light);border-radius:2px;"></span>ገቢ<span style="display:inline-block;width:8px;height:8px;background:#f4a261;border-radius:2px;"></span>ወጪ</span></div><div class="bar-chart">${months.map(m=>`<div class="bar-group"><div class="bars"><div class="bar in" style="height:${Math.max(2,Math.round(m.inc/maxVal*68))}px"></div><div class="bar ex" style="height:${Math.max(2,Math.round(m.exp/maxVal*68))}px"></div></div><div class="bar-label">${m.label}</div></div>`).join('')}</div>`;
}

function renderChips(monthTx){
  const cats=['all',...new Set(monthTx.map(t=>t.cat))];
  document.getElementById('chipContainer').innerHTML=cats.map(cat=>`<button class="chip ${filterCat===cat?'active':''}" onclick="setFilter('${cat}')">${cat==='all'?'ሁሉም':cat}</button>`).join('');
}
function setFilter(cat){ filterCat=cat; renderAll(); }

function renderList(monthTx){
  let list=[...monthTx].sort((a,b)=>b.date.localeCompare(a.date));
  if(currentTab==='income')  list=list.filter(t=>t.type==='income');
  if(currentTab==='expense') list=list.filter(t=>t.type==='expense');
  if(filterCat!=='all')      list=list.filter(t=>t.cat===filterCat);
  const titles={all:'ሁሉም ግብይቶች',income:'የገቢ ምዝገቦች',expense:'የወጪ ምዝገቦች'};
  document.getElementById('listTitle').textContent=titles[currentTab]+` (${list.length})`;
  const el=document.getElementById('txList');
  if(!list.length){ el.innerHTML=`<div class="empty-state"><div class="icon">${currentTab==='income'?'📥':'📤'}</div>ምንም ምዝገባ የለም</div>`; return; }
  const icons={'ደሞዝ':'💼','ቢዝነስ ገቢ':'🏪','ሽያጭ':'🛍️','ቅዳሜ ስራ':'⚒️','ኪራይ':'🏠','ሌላ ገቢ':'💰','ምግብ':'🍽️','ቤት ኪራይ':'🏠','ትራንስፖርት':'🚌','ልብስ':'👔','ጤና':'💊','ትምህርት':'📚','መብራት/ውሃ':'💡','ስልክ':'📱','ቤተሰብ':'👨‍👩‍👧','ሌላ ወጪ':'💸'};
  el.innerHTML=list.map(t=>{
    const icon=icons[t.cat]||(t.type==='income'?'💰':'💸');
    const d=new Date(t.date+'T00:00:00');
    return `<div class="tx-item" onclick="openEdit('${t.id}')"><div class="tx-icon ${t.type}">${icon}</div><div class="tx-info"><div class="tx-desc">${t.desc}</div><div class="tx-cat">${t.cat}</div></div><div class="tx-right"><div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div><div class="tx-date">${d.getDate()} ${MONTHS_AM[d.getMonth()]}</div></div></div>`;
  }).join('');
}

function setTab(tab){ currentTab=tab; filterCat='all'; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active'); renderAll(); }

function openModal(){
  editId=null; currentType='income';
  document.getElementById('modalTitle').textContent='አዲስ ግብይት';
  document.getElementById('submitBtn').textContent='💾 አስቀምጥ';
  document.getElementById('desc').value=''; document.getElementById('amount').value='';
  document.getElementById('txDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('delBtn').style.display='none';
  setType('income'); document.getElementById('overlay').classList.add('open');
}

function openEdit(id){
  const t=txns.find(x=>x.id===id); if(!t) return;
  editId=id;
  document.getElementById('modalTitle').textContent='ምዝገባ አስተካክል';
  document.getElementById('submitBtn').textContent='✏️ አስተካክል';
  document.getElementById('desc').value=t.desc; document.getElementById('amount').value=t.amount;
  document.getElementById('txDate').value=t.date; document.getElementById('delBtn').style.display='block';
  setType(t.type); setTimeout(()=>{ document.getElementById('cat').value=t.cat; },0);
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

function setType(type){
  currentType=type;
  document.getElementById('cat').innerHTML=CATS[type].map(c=>`<option>${c}</option>`).join('');
  document.getElementById('incomeBtn').classList.toggle('active',type==='income');
  document.getElementById('expenseBtn').classList.toggle('active',type==='expense');
}

function saveTx(){
  const desc=document.getElementById('desc').value.trim();
  const amount=parseFloat(document.getElementById('amount').value);
  const cat=document.getElementById('cat').value;
  const date=document.getElementById('txDate').value;
  if(!desc){ alert('መግለጫ ያስፈልጋል!'); return; }
  if(!amount||amount<=0){ alert('ትክክለኛ መጠን ያስፈልጋል!'); return; }
  if(!date){ alert('ቀን ያስፈልጋል!'); return; }
  if(editId){ const idx=txns.findIndex(t=>t.id===editId); txns[idx]={...txns[idx],desc,amount,cat,date,type:currentType}; }
  else { txns.unshift({id:uid(),type:currentType,desc,amount,cat,date}); }
  save(); closeModal(); renderAll();
}

function openDeleteModal(id){ deleteId=id; document.getElementById('delOverlay').classList.add('open'); }
function closeDelModal(){ document.getElementById('delOverlay').classList.remove('open'); deleteId=null; }
function handleDelOverlay(e){ if(e.target===document.getElementById('delOverlay')) closeDelModal(); }
function confirmDelete(){ txns=txns.filter(t=>t.id!==deleteId); save(); closeDelModal(); closeModal(); renderAll(); }
function openDeleteFromEdit(){ if(editId) openDeleteModal(editId); }

// Long-press to delete
let pressTimer;
document.getElementById('txList').addEventListener('touchstart',e=>{
  const item=e.target.closest('.tx-item'); if(!item) return;
  pressTimer=setTimeout(()=>{ const m=item.getAttribute('onclick').match(/'(.+)'/); if(m) openDeleteModal(m[1]); },700);
});
document.getElementById('txList').addEventListener('touchend',()=>clearTimeout(pressTimer));
document.getElementById('txList').addEventListener('touchmove',()=>clearTimeout(pressTimer));

renderAll();
</script>
</body>
</html>
